<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>anomaly — tagging</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>anomaly</h1>
  <span class="breadcrumb"><a href="/index.html">playlists</a> / <span id="playlist-name"></span></span>
  <span style="flex:1"></span>
  <button id="build-btn" class="secondary">Build Set →</button>
</header>
<main>
  <div id="status"></div>
  <table id="tracks-table" style="display:none">
    <thead>
      <tr>
        <th>#</th>
        <th>Track</th>
        <th>Key</th>
        <th>En</th>
        <th>BPM</th>
        <th>Time</th>
        <th>Tags (click to toggle, a track can have more than one)</th>
        <th title="Click to cycle: default → ignore → must include → default">Build</th>
      </tr>
    </thead>
    <tbody id="tracks-body"></tbody>
  </table>

  <div class="section" id="overview-section" style="display:none">
    <h2>Overview</h2>
    <div class="unassigned-tray">
      <h3>Unassigned</h3>
      <div class="cards" id="overview-unassigned"></div>
    </div>
    <div class="board" id="overview-board"></div>
  </div>
</main>
<script src="/tagging.js"></script>
</body>
</html>
