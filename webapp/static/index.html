<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>anomaly</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>anomaly</h1>
  <span class="breadcrumb">playlists</span>
</header>
<main>
  <div class="section">
    <h2>Rekordbox library</h2>
    <div class="form-grid">
      <div class="form-field" style="grid-column: span 2">
        <label>Path to rekordbox.xml (on this machine, readable by the server)</label>
        <input type="text" id="xml-path" style="width:100%">
      </div>
    </div>
    <button type="button" id="save-settings">Save path</button>
    <span style="color: var(--text-dim); margin: 0 8px">or</span>
    <button type="button" id="browse-btn" class="secondary">Browse for file…</button>
    <input type="file" id="xml-file" accept=".xml" style="display:none">
    <button type="button" id="resync-btn" class="secondary" title="Re-read the XML from disk and refresh the playlist list - use this after re-exporting from Rekordbox">↻ Re-sync</button>
    <div id="settings-status"></div>
  </div>

  <div class="section">
    <h2>Playlists</h2>
    <div class="form-field" style="max-width: 400px">
      <input type="text" id="playlist-search" placeholder="Search playlists…" style="width:100%">
    </div>
    <div id="status"></div>
    <table id="playlist-table" style="display:none">
      <thead>
        <tr><th>Playlist</th><th>Tracks</th></tr>
      </thead>
      <tbody id="playlist-body"></tbody>
    </table>
    <div id="no-results" class="note" style="display:none">No playlists match your search.</div>
  </div>
</main>
<script src="/index.js"></script>
</body>
</html>
