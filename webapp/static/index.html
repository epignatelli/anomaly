<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>anomaly</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <h1>anomaly</h1>
  <span class="breadcrumb">playlists</span>
</header>
<main>
  <div class="section">
    <h2>Rekordbox library</h2>
    <div class="form-grid">
      <div class="form-field" style="grid-column: span 2">
        <label>Path to rekordbox.xml</label>
        <input type="text" id="xml-path" style="width:100%">
      </div>
    </div>
    <button type="button" id="save-settings">Save</button>
    <div id="settings-status"></div>
  </div>

  <div class="section">
    <h2>Playlists</h2>
    <div id="status"></div>
    <table id="playlist-table" style="display:none">
      <thead>
        <tr><th>Playlist</th><th>Tracks</th></tr>
      </thead>
      <tbody id="playlist-body"></tbody>
    </table>
  </div>
</main>
<script src="/index.js"></script>
</body>
</html>
